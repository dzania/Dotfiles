#colors
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",*256col*:Tc"
# Start at 1
set -g base-index 1

# Rebind c-b to c-a 
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# split panes using | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
unbind '"'
unbind %

# Change pane 
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R


set -g mouse on
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none
set -sg escape-time 0 
set-window-option -g mode-keys vi
# Don't scroll down after copy

#  modes
# setw -g mode-style 'fg=colour1 bg=colour8 bold'




# Reorder pane numbers
set-option -g renumber-windows on
# statusbar


# ----------------------------=== Theme ===--------------------------

# status
set -g status-interval 1
set -g escape-time 10
set -g focus-events on
set -g status "on"
set -g status-position bottom
set -g status-justify "centre"
set -g status-left-length "100"
set -g status-right-length "100"


# -----------=== Style status bar ====-----------------------------

# Status bar background & default text
set -g status-bg "#151515"
set -g status-style "fg=#E1E1E1"

# Window list
set -g window-status-style "fg=#727272,bg=#151515"
set -g window-status-current-style "fg=#ffffff,bg=#151515,bold"

# Window format
set -g window-status-format " #I:#W#F "
set -g window-status-current-format " #I:#W#F "
set -g window-status-separator ""

# Alignment
set -g status-justify centre

# Left: session name
set -g status-left "#[fg=#E1E1E1,bg=#151515] #S "

# Right: time
set -g status-right "#[fg=#E1E1E1,bg=#151515] %H:%M "

setw -g mouse on
setw -g mode-keys vi



# Open a "test" split-window at the bottom
bind t split-window -f -l 15 -c "#{pane_current_path}"
# Open a "test" split-window at the right
bind T split-window -h -f -p 35 -c "#{pane_current_path}"

# Open battle station tab
bind B new-window -c "#{pane_current_path}" \; \
    split-window -v -l 15 -c "#{pane_current_path}" \; \
    select-pane -t 0 \; \
    split-window -h -p 30 -c "#{pane_current_path}" \; \
    select-pane -t 0

# List of plugin
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-yank'
run '~/.tmux/plugins/tpm/tpm'
